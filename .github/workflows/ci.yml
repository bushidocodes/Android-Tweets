name: Android CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:   # allow manual runs from the Actions tab

jobs:
  test:
    name: Unit tests · lint · build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # JDK 17 is required by AGP 8.7 / compileOptions VERSION_17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle   # caches ~/.gradle/caches and wrapper

      # gradlew may not be executable after checkout on Linux
      - name: Make gradlew executable
        run: chmod +x gradlew

      # local.properties is gitignored; CI needs it to locate the Android SDK
      - name: Write local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      # google_maps_api.xml is gitignored to prevent key leakage.
      # Inject the key from the MAPS_API_KEY repository secret.
      # Unit tests and lint pass with an empty key; assembleDebug needs the file to exist.
      - name: Write Maps API key
        run: |
          mkdir -p app/src/debug/res/values
          cat > app/src/debug/res/values/google_maps_api.xml <<EOF
          <resources>
            <string name="google_maps_key" templateMergeStrategy="preserve" translatable="false">${{ secrets.MAPS_API_KEY }}</string>
          </resources>
          EOF

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest

      - name: Run lint
        run: ./gradlew lintDebug

      - name: Assemble debug APK
        run: ./gradlew assembleDebug

      # Upload reports so they're accessible from the Actions UI even on failure
      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: app/build/reports/tests/testDebugUnitTest/

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: app/build/reports/lint-results-debug.html

      - name: Upload debug APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
